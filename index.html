const clamp=(v,a,b)=>Math.max(a,Math.min(b,v)),dist=(x1,y1,x2,y2)=>Math.hypot(x2-x1,y2-y1),lerp=(a,b,t)=>a+(b-a)*t;
const aNorm=a=>{while(a<-Math.PI)a+=Math.PI*2;while(a>Math.PI)a-=Math.PI*2;return a;};
function tileAt(x,y){const ix=Math.floor(x),iy=Math.floor(y);if(ix<0||iy<0||ix>=world.w||iy>=world.h)return TILE.W1;return world.map[iy]?.[ix]??TILE.E;}
function isSolid(x,y){const t=tileAt(x,y);if(t===TILE.E||t===TILE.X)return false;if(t>=TILE.D&&t<=TILE.DB){const d=world.doors.get(`${Math.floor(x)},${Math.floor(y)}`);return !(d&&d.open>=.9);}return t>0;}
function isFree(x,y,r){for(let dx=-1;dx<=1;dx++)for(let dy=-1;dy<=1;dy++)if(isSolid(x+dx*r*.9,y+dy*r*.9))return false;return true;}
function canSee(x1,y1,x2,y2){const d=dist(x1,y1,x2,y2);if(d<.01)return true;const s=Math.ceil(d/.3);for(let i=1;i<s;i++)if(isSolid(lerp(x1,x2,i/s),lerp(y1,y2,i/s)))return false;return true;}
function safeSp(nx,ny,r){for(let R=3;R<=40;R+=3)for(let a=0;a<Math.PI*2;a+=0.3){const x=nx+Math.cos(a)*R,y=ny+Math.sin(a)*R;if(x>2&&y>2&&x<world.w-2&&y<world.h-2&&isFree(x,y,r+.3))return{x,y};}return{x:nx+5,y:ny+5};}

// =========== REALISTIC AUDIO ===========
function initAudio(){
  if(!audioCtx){
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    masterGain=audioCtx.createGain();masterGain.gain.value=0.7;masterGain.connect(audioCtx.destination);
    const len=audioCtx.sampleRate*0.8;
    const imp=audioCtx.createBuffer(2,len,audioCtx.sampleRate);
    for(let c2=0;c2<2;c2++){const d=imp.getChannelData(c2);for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,2.5);}
    reverbNode=audioCtx.createConvolver();reverbNode.buffer=imp;
    const revGain=audioCtx.createGain();revGain.gain.value=0.15;
    reverbNode.connect(revGain);revGain.connect(masterGain);
  }
  if(audioCtx.state==="suspended")audioCtx.resume();
}

function snd(k,x,y){
  if(!audioCtx)return;
  const t=audioCtx.currentTime;
  const vol=x!==undefined?clamp(1-dist(player.x,player.y,x,y)/20,.1,1):.8;
  
  if(k==="shot"){
    const n=audioCtx.createBuffer(1,audioCtx.sampleRate*.12,audioCtx.sampleRate);
    const d=n.getChannelData(0);
    for(let i=0;i<d.length;i++){const env=Math.pow(1-i/d.length,1.5);d[i]=(Math.random()*2-1)*env*(i<500?2:1);}
    const s=audioCtx.createBufferSource();s.buffer=n;
    const hp=audioCtx.createBiquadFilter();hp.type="highpass";hp.frequency.value=800;
    const lp=audioCtx.createBiquadFilter();lp.type="lowpass";lp.frequency.value=4000;
    s.connect(hp);hp.connect(lp);
    const g=audioCtx.createGain();g.gain.setValueAtTime(vol*.4,t);
    lp.connect(g);g.connect(masterGain);if(reverbNode){const w=audioCtx.createGain();w.gain.value=vol*.15;lp.connect(w);w.connect(reverbNode);}
    s.start();
  }else if(k==="shotgun"){
    const n=audioCtx.createBuffer(1,audioCtx.sampleRate*.25,audioCtx.sampleRate);
    const d=n.getChannelData(0);
    for(let i=0;i<d.length;i++){const env=Math.pow(1-i/d.length,1.2);d[i]=(Math.random()*2-1)*env*1.5;}
    const s=audioCtx.createBufferSource();s.buffer=n;
    const lp=audioCtx.createBiquadFilter();lp.type="lowpass";lp.frequency.value=1200;
    s.connect(lp);const g=audioCtx.createGain();g.gain.setValueAtTime(vol*.6,t);
    lp.connect(g);g.connect(masterGain);if(reverbNode){const w=audioCtx.createGain();w.gain.value=vol*.25;lp.connect(w);w.connect(reverbNode);}
    s.start();
  }else if(k==="rpg"){
    const n=audioCtx.createBuffer(1,audioCtx.sampleRate*.7,audioCtx.sampleRate);
    const d=n.getChannelData(0);
    for(let i=0;i<d.length;i++){const env=i<d.length*.1?i/(d.length*.1):Math.pow(1-(i-d.length*.1)/(d.length*.9),1.5);d[i]=(Math.random()*2-1)*env*1.2;}
    const s=audioCtx.createBufferSource();s.buffer=n;
    const lp=audioCtx.createBiquadFilter();lp.type="lowpass";lp.frequency.setValueAtTime(200,t);lp.frequency.exponentialRampToValueAtTime(800,t+.15);lp.frequency.exponentialRampToValueAtTime(150,t+.7);
    s.connect(lp);const g=audioCtx.createGain();g.gain.setValueAtTime(vol*.8,t);
    lp.connect(g);g.connect(masterGain);if(reverbNode){const w=audioCtx.createGain();w.gain.value=vol*.4;lp.connect(w);w.connect(reverbNode);}
    s.start();
  }else if(k==="sniper"){
    // AWP distinctive crack + echo
    const n=audioCtx.createBuffer(1,audioCtx.sampleRate*.4,audioCtx.sampleRate);
    const d=n.getChannelData(0);
    for(let i=0;i<d.length;i++){
      const env=i<200?i/200:Math.pow(1-i/d.length,0.8);
      d[i]=(Math.random()*2-1)*env*2*(i<300?2.5:1);
    }
    const s=audioCtx.createBufferSource();s.buffer=n;
    const bp=audioCtx.createBiquadFilter();bp.type="bandpass";bp.frequency.value=1800;bp.Q.value=0.8;
    s.connect(bp);const g=audioCtx.createGain();g.gain.setValueAtTime(vol*.7,t);
    bp.connect(g);g.connect(masterGain);
    if(reverbNode){const w=audioCtx.createGain();w.gain.value=vol*.5;bp.connect(w);w.connect(reverbNode);}
    s.start();
    // Echo crack
    const o=audioCtx.createOscillator();o.type="sawtooth";o.frequency.setValueAtTime(2000,t);o.frequency.exponentialRampToValueAtTime(400,t+.08);
    const g2=audioCtx.createGain();g2.gain.setValueAtTime(vol*.2,t);g2.gain.exponentialRampToValueAtTime(.001,t+.1);
    o.connect(g2);g2.connect(masterGain);o.start(t);o.stop(t+.1);
  }else if(k==="hurt"){
    const o=audioCtx.createOscillator();o.type="sawtooth";o.frequency.setValueAtTime(200,t);o.frequency.exponentialRampToValueAtTime(80,t+.15);
    const g=audioCtx.createGain();g.gain.setValueAtTime(vol*.25,t);g.gain.exponentialRampToValueAtTime(.001,t+.15);
    o.connect(g);g.connect(masterGain);o.start(t);o.stop(t+.15);
  }else if(k==="pickup"){
    const o=audioCtx.createOscillator();o.type="sine";o.frequency.setValueAtTime(440,t);o.frequency.exponentialRampToValueAtTime(880,t+.08);
    const g=audioCtx.createGain();g.gain.setValueAtTime(vol*.15,t);g.gain.exponentialRampToValueAtTime(.001,t+.1);
    o.connect(g);g.connect(masterGain);o.start(t);o.stop(t+.1);
  }else if(k==="door"){
    const n=audioCtx.createBuffer(1,audioCtx.sampleRate*.3,audioCtx.sampleRate);
    const d=n.getChannelData(0);
    for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,.8)*.3;

  }else if(k==="select"){

    const g=audioCtx.createGain();g.gain.setValueAtTime(.2,t);g.gain.exponentialRampToValueAtTime(.001,t+.18);

function loadMapData(m){world.map=[];world.doors.clear();enemies.length=0;pickups.length=0;projs.length=0;parts.length=0;lights.length=0;world.h=m.length;world.w=Math.max(...m.map(r=>r.length));world.exitX=0;world.exitY=0;portalActive=false;portalX=0;portalY=0;hasPortalKey=false;bossAlive=false;keyRpos=null;keyBpos=null;for(let y=0;y<world.h;y++){const row=[];const l=m[y]||"";for(let x=0;x<world.w;x++){const ch=l[x]||" ";let t=TILE.E;if(ch==="1")t=TILE.W1;else if(ch==="2")t=TILE.W2;else if(ch==="3")t=TILE.W3;else if(ch==="4")t=TILE.W4;else if(ch==="5")t=TILE.W5;else if(ch==="6")t=TILE.W6;else if(ch==="D"){t=TILE.D;world.doors.set(`${x},${y}`,{open:0,opening:false});}else if(ch==="R"){t=TILE.DR;world.doors.set(`${x},${y}`,{open:0,opening:false});}else if(ch==="B"){t=TILE.DB;world.doors.set(`${x},${y}`,{open:0,opening:false});}else if(ch==="9"){t=TILE.X;world.exitX=x+.5;world.exitY=y+.5;}else if(ch==="P"){player.x=x+.5;player.y=y+.5;}else if(ch==="i")spawnE(x+.5,y+.5,"imp");else if(ch==="d")spawnE(x+.5,y+.5,"demon");else if(ch==="c")spawnE(x+.5,y+.5,"caco");else if(ch==="o")spawnE(x+.5,y+.5,"cow");else if(ch==="s")spawnE(x+.5,y+.5,"skibidi");else if(ch==="A")spawnE(x+.5,y+.5,"amogus");else if(ch==="T")spawnE(x+.5,y+.5,"tramway",true,2);else if(ch==="C")spawnE(x+.5,y+.5,"cameraman",true,2);else if(ch==="I")spawnE(x+.5,y+.5,"impostor",true,2);else if(ch==="G")spawnE(x+.5,y+.5,"giant",true,6);else if(ch==="m")pickups.push({x:x+.5,y:y+.5,type:"ammo",alive:true});else if(ch==="+")pickups.push({x:x+.5,y:y+.5,type:"med",alive:true});else if(ch==="a")pickups.push({x:x+.5,y:y+.5,type:"armor",alive:true});else if(ch==="H")pickups.push({x:x+.5,y:y+.5,type:"bigmed",alive:true});else if(ch==="k"){pickups.push({x:x+.5,y:y+.5,type:"keyR",alive:true});keyRpos={x:x+.5,y:y+.5};}else if(ch==="b"){pickups.push({x:x+.5,y:y+.5,type:"keyB",alive:true});keyBpos={x:x+.5,y:y+.5};}else if(ch==="M")pickups.push({x:x+.5,y:y+.5,type:"milk",alive:true});row.push(t);}world.map.push(row);}}

function spawnE(x,y,type,boss=false,scale=1){const S={imp:{h:50,s:2.2,r:.3},demon:{h:100,s:3.8,r:.35},caco:{h:250,s:1.6,r:.4},mega:{h:2000,s:2,r:1},giant:{h:4000,s:1.2,r:2},cow:{h:50,s:2.2,r:.35},tramway:{h:2000,s:5.5,r:1.2},spider:{h:30,s:5,r:.2},skibidi:{h:70,s:2.8,r:.3},cameraman:{h:2000,s:2.2,r:.8},amogus:{h:100,s:2.8,r:.35},impostor:{h:2500,s:2.8,r:.9}};const s=S[type]||S.imp;if(boss)bossAlive=true;enemies.push({x,y,type,hp:s.h,maxHp:s.h,speed:s.s,state:"idle",cd:0,dead:false,dt:0,r:s.r*scale,scale,boss,stuck:0});}

function startPhase(idx){phase=idx;hasPortalKey=false;portalActive=false;portalX=0;portalY=0;bossAlive=false;parts.length=0;lights.length=0;if(idx===0){loadMapData(MAPS.phase0);hasSuit=false;player.hp=100;player.armor=0;player.ammo=60;player.shells=24;player.rockets=0;player.sniper=10;player.weapon=1;player.rpg=false;player.awp=true;player.kills=0;player.kR=false;player.kB=false;msg("🔴 -> 🔵 -> EXIT!",5);}else if(idx===1){hasSuit=false;cut("МЕГА-ДЕМОН!",2,()=>{snd("roar");screenShake=1;shakePow=15;const sp=safeSp(player.x,player.y,1);spawnE(sp.x,sp.y,"mega",true,2.5);msg("УБЕЙ БОССА!",3);state=STATE.PLAY;});}else if(idx===2){bKills=0;bKeyDropped=false;hasSuit=false;cut("БЕКРУМС - 25!",2,()=>{loadMapData(MAPS.phase2);player.rpg=true;player.rockets=60;player.weapon=3;player.hp=Math.max(player.hp,90);player.ammo=200;player.shells=100;player.sniper=30;msg("РПГ! 25 МОНСТРОВ!",4);state=STATE.PLAY;});}else if(idx===3){hasSuit=false;cut("СЕЛО",2,()=>{loadMapData(MAPS.phase3);player.kR=false;msg("🔴 -> ТРАМВАЙ!",3);state=STATE.PLAY;});}else if(idx===4){hasSuit=false;cut("СКИБИДИ",2,()=>{loadMapData(MAPS.phase4);player.kR=false;msg("🔴 -> КАМЕРАМЕН!",3);state=STATE.PLAY;});}else if(idx===5){cut("THE SKELD",2,()=>{loadMapData(MAPS.phase5);player.kR=false;player.kB=false;hasSuit=true;msg("🚀-65%! 🔴🔵!",4);state=STATE.PLAY;});}else if(idx===6){cut("ФИНАЛ",2,()=>{loadMapData(MAPS.phase6);player.x=3;player.y=9;player.hp=100;player.armor=100;player.rockets=80;player.sniper=40;player.weapon=3;player.rpg=true;msg("УНИЧТОЖЬ ДРЕВНЕГО!",3);state=STATE.PLAY;});}}

function getHit(d){let dmg=d;if(hasSuit)dmg=Math.ceil(d*0.35);if(player.armor>0){const ab=Math.min(player.armor,Math.ceil(dmg*.6));player.armor-=ab;dmg-=ab;}player.hp-=dmg;player.hurt=.35;snd("hurt");if(player.hp<=0){player.hp=0;state=STATE.DEAD;}}

function addPart(x,y,z,vx,vy,vz,life,color,size){if(parts.length>=MAX_PARTS)parts.shift();parts.push({x,y,z,vx,vy,vz,life,t:0,color,size});}

function expld(x,y,dm){

  for(const e of enemies){if(e.dead)continue;const d=dist(x,y,e.x,e.y);if(d<5){e.hp-=Math.ceil(dm*(1-d/5));bld(e.x,e.y,6);if(e.hp<=0&&!e.dead){e.dead=true;e.dt=.4;player.kills++;if(phase===2)bKills++;bld(e.x,e.y,12);snd("death",e.x,e.y);onDead(e);}}}

function sht(){if(player.cool>0||state!==STATE.PLAY)return;let dm=0,rg=0,pl=1,sp=0;if(player.weapon===0){dm=25;rg=2;player.cool=.3;}else if(player.weapon===1){if(player.ammo<=0)return;player.ammo--;dm=35;rg=40;player.cool=.18;snd("shot");spark(player.x+Math.cos(player.a)*.4,player.y+Math.sin(player.a)*.4,4,"#ff0");}else if(player.weapon===2){if(player.shells<=0)return;player.shells--;dm=22;rg=26;pl=7;sp=.1;player.cool=.55;snd("shotgun");spark(player.x+Math.cos(player.a)*.4,player.y+Math.sin(player.a)*.4,8,"#f80");}else if(player.weapon===3){if(player.rockets<=0)return;player.rockets--;player.cool=.7;player.flash=.3;screenShake=.5;shakePow=20;snd("rpg");if(projs.length<MAX_PROJS){const dx=Math.cos(player.a),dy=Math.sin(player.a);projs.push({x:player.x+dx*.5,y:player.y+dy*.5,dx,dy,dmg:550,speed:22,life:4,rk:true,pl:true});}addLight(player.x,player.y,3,.12);return;}else if(player.weapon===4){
  // AWP SNIPER
  if(player.sniper<=0)return;player.sniper--;dm=300;rg=80;player.cool=1.4;player.flash=.25;screenShake=.6;shakePow=25;snd("sniper");
  spark(player.x+Math.cos(player.a)*.6,player.y+Math.sin(player.a)*.6,6,"#ff8");addLight(player.x,player.y,4,.15);
  // Tracer line effect
  const tx=player.x+Math.cos(player.a)*rg,ty=player.y+Math.sin(player.a)*rg;
  for(let i=1;i<12;i++){const p=i/12;addPart(lerp(player.x,tx,p),lerp(player.y,ty,p),.5,0,0,0,.2,"#ff8",1);}
}
player.flash=player.flash||.1;
for(const e of enemies)if(!e.dead&&dist(e.x,e.y,player.x,player.y)<20)e.state="chase";
for(let p=0;p<pl;p++){const a=player.a+(Math.random()-.5)*sp,rx=Math.cos(a),ry=Math.sin(a);let best=null,bD=rg;for(const e of enemies){if(e.dead)continue;const ex=e.x-player.x,ey=e.y-player.y,pr=ex*rx+ey*ry;if(pr<=0||pr>bD)continue;if((ex-rx*pr)**2+(ey-ry*pr)**2>(e.r+.2)**2)continue;if(!canSee(player.x,player.y,e.x,e.y))continue;best=e;bD=pr;}if(best){let d=dm;if(player.weapon===2)d=Math.ceil(dm*clamp(1-bD/rg,.4,1));best.hp-=d;best.state="chase";bld(best.x,best.y,player.weapon===4?8:4);if(best.hp<=0&&!best.dead){best.dead=true;best.dt=.4;player.kills++;if(phase===2){bKills++;msg(`${bKills}/25`,1);}bld(best.x,best.y,12);snd("death",best.x,best.y);onDead(best);}}}}

function startIntro(){
  state=STATE.INTRO;
  introState={phase:0,timer:0,textIdx:0,charIdx:0,charTimer:0,camX:400,camY:300,camTargetX:400,camTargetY:300,fadeAlpha:1,shakeAmt:0,lines:[],currentLine:"",done:false,waitTimer:0};
}

function updateIntro(dt){
  const s=introState;
  s.timer+=dt;
  
  // Camera slow pan
  s.camX=lerp(s.camX,s.camTargetX,dt*.5);
  s.camY=lerp(s.camY,s.camTargetY,dt*.5);
  
  // Fade in
  if(s.timer<2){s.fadeAlpha=Math.max(0,1-s.timer/2);return;}
  
  // Type text
  if(s.textIdx<introDialogue.length){
    const line=introDialogue[s.textIdx];
    s.charTimer+=dt;
    if(s.charTimer>=0.035){
      s.charTimer=0;
      if(s.charIdx<line.text.length){
        s.currentLine=line.text.substring(0,s.charIdx+1);
        s.charIdx++;
        if(s.charIdx%3===0)snd("radio");
      }else{
        s.waitTimer+=dt;
        if(s.waitTimer>=line.pause){
          s.waitTimer=0;s.charIdx=0;s.textIdx++;s.currentLine="";
          // Move camera
          s.camTargetX=200+Math.random()*400;s.camTargetY=200+Math.random()*200;
        }
      }
    }
    s.shakeAmt=lerp(s.shakeAmt,line.shake||0,dt*5);
  }else{
    // Fade out
    s.fadeAlpha=Math.min(1,s.fadeAlpha+dt*.8);
    if(s.fadeAlpha>=1&&!s.done){
      s.done=true;
      startPhase(0);state=STATE.PLAY;canvas.requestPointerLock?.();snd("ambient");
    }
  }
}

function renderIntro(){

  // Computer screens glow

  for(let i=0;i<5;i++){

    ctx.fillStyle=sg;ctx.beginPath();ctx.arc(sx,sy,60,0,7);ctx.fill();
  }
  
  // Scientists silhouettes
  const sciY=H-200;
  // Scientist 1
  ctx.fillStyle="#0a140a";
  ctx.beginPath();ctx.arc(250,sciY-30,22,0,7);ctx.fill();
  ctx.fillRect(228,sciY-10,44,60);
  // Lab coat
  ctx.fillStyle="#1a2a1a";
  ctx.fillRect(225,sciY-5,50,65);
  // Glasses reflection

    ctx.fillStyle="rgba(0,255,128,.3)";ctx.beginPath();ctx.arc(242,sciY-32,4,0,7);ctx.arc(258,sciY-32,4,0,7);ctx.fill();
  }
  
  // Scientist 2
  ctx.fillStyle="#0a140a";
  ctx.beginPath();ctx.arc(550,sciY-25,20,0,7);ctx.fill();
  ctx.fillRect(530,sciY-5,40,55);
  ctx.fillStyle="#1a2a1a";ctx.fillRect(527,sciY,46,58);
  
  // Commander (center, larger)
  ctx.fillStyle="#0a100a";
  ctx.beginPath();ctx.arc(400,sciY-35,25,0,7);ctx.fill();
  ctx.fillRect(375,sciY-12,50,70);
  // Military hat
  ctx.fillStyle="#0a1a0a";ctx.fillRect(375,sciY-55,50,15);
  // Stars on shoulders
  if(s.textIdx<introDialogue.length&&introDialogue[s.textIdx].speaker.includes("КОМАНДИР")){
    ctx.fillStyle="rgba(200,180,60,.4)";ctx.beginPath();ctx.arc(380,sciY-8,3,0,7);ctx.arc(420,sciY-8,3,0,7);ctx.fill();
  }
  
  // Warning lights
  const warnAlpha=Math.sin(ambientTime*4)*.4+.4;
  ctx.fillStyle=`rgba(255,0,0,${warnAlpha*.3})`;
  ctx.beginPath();ctx.arc(50,50,30,0,7);ctx.fill();
  ctx.beginPath();ctx.arc(W-50,50,30,0,7);ctx.fill();
  
  // Scanlines
  ctx.fillStyle="rgba(0,0,0,.06)";
  for(let y=0;y<H;y+=3)ctx.fillRect(0,y,W,1);
  
  ctx.restore();
  
  // Dialogue box
  if(s.textIdx<introDialogue.length&&s.timer>2){
    const line=introDialogue[s.textIdx];
    const boxH=100;
    const boxY=H-boxH-20;
    
    // Box background with gradient
    const dg=ctx.createLinearGradient(0,boxY,0,boxY+boxH);
    dg.addColorStop(0,"rgba(0,20,0,.92)");dg.addColorStop(1,"rgba(0,10,0,.95)");
    ctx.fillStyle=dg;ctx.fillRect(30,boxY,W-60,boxH);
    
    // Border with glow
    ctx.strokeStyle="#0a4";ctx.lineWidth=2;ctx.strokeRect(30,boxY,W-60,boxH);
    ctx.strokeStyle="rgba(0,200,100,.15)";ctx.lineWidth=4;ctx.strokeRect(28,boxY-2,W-56,boxH+4);
    
    // Corner decorations
    const corners=[[32,boxY+2],[W-32,boxY+2],[32,boxY+boxH-2],[W-32,boxY+boxH-2]];
    ctx.fillStyle="#0f8";
    corners.forEach(([cx,cy])=>{ctx.beginPath();ctx.arc(cx,cy,3,0,7);ctx.fill();});
    
    // Speaker name
    if(line.speaker){
      ctx.fillStyle="#0f8";ctx.font="bold 14px Courier New";ctx.textAlign="left";
      ctx.fillText(line.speaker,55,boxY+22);
      ctx.fillStyle="rgba(0,255,128,.3)";ctx.fillRect(55,boxY+26,ctx.measureText(line.speaker).width,1);
    }
    
    // Text with typewriter effect
    ctx.fillStyle="#0e8";ctx.font="16px Courier New";ctx.textAlign="left";
    // Word wrap
    const words=s.currentLine.split(" ");let curLine="",lineY=boxY+48;
    for(const w of words){
      const test=curLine?curLine+" "+w:w;
      if(ctx.measureText(test).width>W-130){ctx.fillText(curLine,55,lineY);lineY+=22;curLine=w;}
      else curLine=test;
    }
    if(curLine)ctx.fillText(curLine,55,lineY);
    
    // Blinking cursor
    if(s.charIdx<(introDialogue[s.textIdx]?.text.length||0)){
      if(Math.floor(ambientTime*4)%2){ctx.fillStyle="#0f8";ctx.fillRect(55+ctx.measureText(curLine).width+2,lineY-12,10,14);}
    }
    
    // Progress indicator
    ctx.fillStyle="#063";ctx.font="11px Courier New";ctx.textAlign="right";
    ctx.fillText(`[${s.textIdx+1}/${introDialogue.length}]`,W-45,boxY+boxH-8);
  }
  
  // Skip hint
  ctx.fillStyle="rgba(0,180,80,.4)";ctx.font="12px Courier New";ctx.textAlign="center";
  if(Math.floor(ambientTime*2)%2)ctx.fillText("[ENTER / SPACE] ПРОПУСТИТЬ",W/2,25);
  
  // Fade overlay
  if(s.fadeAlpha>0){ctx.fillStyle=`rgba(0,0,0,${s.fadeAlpha})`;ctx.fillRect(0,0,W,H);}
}

// ========= OUTRO CINEMATIC =========
function startOutro(){
  state=STATE.OUTRO;
  outroState={phase:0,timer:0,textIdx:0,charIdx:0,charTimer:0,fadeAlpha:0,currentLine:"",done:false,waitTimer:0,earthRot:0,particles:[]};
  // Generate debris particles
  for(let i=0;i<60;i++){
    outroState.particles.push({
      x:Math.random()*W,y:Math.random()*H,
      vx:(Math.random()-.5)*20,vy:(Math.random()-.5)*20,
      size:1+Math.random()*3,
      color:["#f60","#a40","#840","#fa0","#ff0"][Math.floor(Math.random()*5)],
      life:3+Math.random()*5
    });
  }
}

function updateOutro(dt){
  const s=outroState;
  s.timer+=dt;s.earthRot+=dt*.2;
  
  // Update particles
  for(const p of s.particles){p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt;if(p.life<0){p.x=Math.random()*W;p.y=Math.random()*H;p.life=2+Math.random()*4;}}
  
  // Fade in
  if(s.timer<3){s.fadeAlpha=Math.max(0,1-s.timer/3);return;}
  
  // Text progression
  if(s.textIdx<outroDialogue.length){
    const line=outroDialogue[s.textIdx];
    s.charTimer+=dt;
    if(s.charTimer>=0.06){
      s.charTimer=0;
      if(s.charIdx<line.text.length){
        s.currentLine=line.text.substring(0,s.charIdx+1);
        s.charIdx++;
      }else{
        s.waitTimer+=dt;
        if(s.waitTimer>=line.pause){
          s.waitTimer=0;s.charIdx=0;s.textIdx++;s.currentLine="";
        }
      }
    }
    if(s.timer>3&&Math.floor(s.timer*2)%8===0)snd("heartbeat");
  }else{
    s.fadeAlpha=Math.min(1,s.fadeAlpha+dt*.4);
    if(s.fadeAlpha>=1&&!s.done){s.done=true;gameCompleted=true;state=STATE.MENU;}
  }
}

function renderOutro(){
  const s=outroState;
  
  // Deep space background
  ctx.fillStyle="#010108";ctx.fillRect(0,0,W,H);
  
  // Stars
  for(let i=0;i<100;i++){
    const sx=(Math.sin(i*7.3+s.earthRot*.1)*400+400)%W;
    const sy=(Math.cos(i*11.7+s.earthRot*.05)*300+300)%H;
    const bright=.3+Math.sin(ambientTime*2+i)*.2;
    ctx.fillStyle=`rgba(200,220,255,${bright})`;
    ctx.beginPath();ctx.arc(sx,sy,.5+Math.sin(i)*.3,0,7);ctx.fill();
  }
  
  // Debris particles
  for(const p of s.particles){
    if(p.life>0){
      ctx.globalAlpha=Math.min(1,p.life*.5);
      ctx.fillStyle=p.color;
      ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,7);ctx.fill();
    }
  }
  ctx.globalAlpha=1;
  
  // Earth - transitions from normal to destroyed
  const earthX=W/2,earthY=H/2-40;
  const destroyProgress=clamp((s.timer-5)/8,0,1);
  
  ctx.save();
  ctx.translate(earthX,earthY);
  ctx.rotate(s.earthRot);
  
  if(destroyProgress<1){
    ctx.globalAlpha=1-destroyProgress;
    ctx.drawImage(earthTex,-100,-100);
  }
  if(destroyProgress>0){
    ctx.globalAlpha=destroyProgress;
    ctx.drawImage(destroyedEarthTex,-100,-100);
    // Fire ring
    if(destroyProgress>.5){
      ctx.strokeStyle=`rgba(255,100,20,${(destroyProgress-.5)*.4})`;
      ctx.lineWidth=3;
      ctx.beginPath();ctx.arc(0,0,85+Math.sin(ambientTime*5)*3,0,7);ctx.stroke();
    }
  }
  ctx.globalAlpha=1;
  ctx.restore();
  
  // Smoke/ash in atmosphere
  for(let i=0;i<8;i++){
    const sx=earthX+Math.cos(s.earthRot+i)*90;
    const sy=earthY+Math.sin(s.earthRot+i)*90;
    const sg=ctx.createRadialGradient(sx,sy,0,sx,sy,15);
    sg.addColorStop(0,`rgba(80,40,20,${destroyProgress*.15})`);
    sg.addColorStop(1,"rgba(0,0,0,0)");
    ctx.fillStyle=sg;ctx.beginPath();ctx.arc(sx,sy,15,0,7);ctx.fill();
  }
  
  // Dialogue
  if(s.textIdx<outroDialogue.length&&s.timer>3){
    const line=outroDialogue[s.textIdx];
    const boxH=90;const boxY=H-boxH-15;
    
    // Somber dialogue box
    const dg=ctx.createLinearGradient(0,boxY,0,boxY+boxH);
    dg.addColorStop(0,"rgba(10,5,15,.9)");dg.addColorStop(1,"rgba(5,2,10,.95)");
    ctx.fillStyle=dg;ctx.fillRect(30,boxY,W-60,boxH);
    ctx.strokeStyle="rgba(100,60,80,.5)";ctx.lineWidth=1;ctx.strokeRect(30,boxY,W-60,boxH);
    
    // Speaker
    if(line.speaker){
      ctx.fillStyle="#c88";ctx.font="bold 13px Courier New";ctx.textAlign="left";
      ctx.fillText(line.speaker,55,boxY+20);
    }
    
    // Text - more emotional styling
    const isEllipsis=line.text==="..." ||line.text==="И...";
    ctx.fillStyle=isEllipsis?"#886":"#ca8";
    ctx.font=isEllipsis?"bold 28px Courier New":"15px Courier New";
    ctx.textAlign=isEllipsis?"center":"left";
    
    if(isEllipsis){
      ctx.fillText(s.currentLine,W/2,boxY+55);
    }else{
      const words=s.currentLine.split(" ");let curLine="",lineY=boxY+42;
      for(const w of words){
        const test=curLine?curLine+" "+w:w;
        if(ctx.measureText(test).width>W-130){ctx.fillText(curLine,55,lineY);lineY+=20;curLine=w;}
        else curLine=test;
      }
      if(curLine)ctx.fillText(curLine,55,lineY);
    }
  }
  
  // "THE END" after all text
  if(s.textIdx>=outroDialogue.length){
    const endAlpha=clamp((s.timer-s.timer+2)*1,0,1);
    ctx.globalAlpha=endAlpha;
    ctx.fillStyle="#a86";ctx.font="bold 48px Impact";ctx.textAlign="center";
    ctx.fillText("КОНЕЦ",W/2,H/2);
    ctx.fillStyle="#654";ctx.font="16px Courier New";
    ctx.fillText("Спасибо за игру",W/2,H/2+40);
    ctx.globalAlpha=1;
  }
  
  // Skip hint
  ctx.fillStyle="rgba(120,80,80,.35)";ctx.font="11px Courier New";ctx.textAlign="center";
  if(Math.floor(ambientTime*1.5)%2)ctx.fillText("[ENTER] ПРОПУСТИТЬ",W/2,20);
  
  // Fade
  if(s.fadeAlpha>0){ctx.fillStyle=`rgba(0,0,0,${s.fadeAlpha})`;ctx.fillRect(0,0,W,H);}
}

function update(dt){
  menuAnim+=dt;skullAnim+=dt*8;cursorPulse+=dt*4;ambientTime+=dt;
  if(msgTimer>0)msgTimer-=dt;if(screenShake>0)screenShake-=dt*.8;if(player.cool>0)player.cool-=dt;if(player.flash>0)player.flash-=dt;if(player.hurt>0)player.hurt-=dt;exitGlow+=dt*3;
  for(let i=lights.length-1;i>=0;i--){lights[i].t+=dt;if(lights[i].t>=lights[i].life)lights.splice(i,1);}
  if(state===STATE.INTRO){updateIntro(dt);return;}
  if(state===STATE.OUTRO){updateOutro(dt);return;}
  if(state===STATE.CUT){cutTimer-=dt;if(cutTimer<=0&&cutCb){cutCb();cutCb=null;}return;}
  if(state===STATE.WIN){return;}
  if(state!==STATE.PLAY)return;
  
  let rot=0;if(keys.ArrowLeft)rot-=3*dt;if(keys.ArrowRight)rot+=3*dt;rot+=mouseDX*.003;mouseDX=0;player.a=aNorm(player.a+rot);
  const spd=(keys.ShiftLeft||keys.ShiftRight)?7.5:5;let vx=0,vy=0;
  const fx=Math.cos(player.a),fy=Math.sin(player.a),sx=Math.cos(player.a+Math.PI/2),sy=Math.sin(player.a+Math.PI/2);
  if(keys.KeyW||keys.ArrowUp){vx+=fx;vy+=fy;}if(keys.KeyS||keys.ArrowDown){vx-=fx;vy-=fy;}if(keys.KeyA){vx-=sx;vy-=sy;}if(keys.KeyD){vx+=sx;vy+=sy;}
  const len=Math.hypot(vx,vy);if(len>0){vx/=len;vy/=len;}
  if(isFree(player.x+vx*spd*dt,player.y,.22))player.x+=vx*spd*dt;
  if(isFree(player.x,player.y+vy*spd*dt,.22))player.y+=vy*spd*dt;
  if(len>.1){player.bob+=dt*10;player.steps+=dt;if(player.steps>.35){player.steps=0;snd("step");}}
  if(keys.Digit1)player.weapon=0;if(keys.Digit2)player.weapon=1;if(keys.Digit3)player.weapon=2;if(keys.Digit4&&player.rpg)player.weapon=3;if(keys.Digit5&&player.awp)player.weapon=4;
  // Right click zoom for AWP
  player.zoom=player.weapon===4&&keys.mouse2;
  if(keys.Space||keys.mouse)sht();
  if(keys.KeyE&&!keys._e){keys._e=true;for(let d=.3;d<=1.8;d+=.25){const tx=Math.floor(player.x+Math.cos(player.a)*d),ty=Math.floor(player.y+Math.sin(player.a)*d);const t=tileAt(tx,ty);if(t>=TILE.D&&t<=TILE.DB){const dr=world.doors.get(`${tx},${ty}`);if(dr&&!dr.opening&&dr.open<.9){if(t===TILE.DR&&!player.kR){msg("🔴!",1.5);snd("denied");break;}if(t===TILE.DB&&!player.kB){msg("🔵!",1.5);snd("denied");break;}dr.opening=true;snd("door");break;}}}}if(!keys.KeyE)keys._e=false;
  for(const[k,d]of world.doors)if(d.opening){d.open=Math.min(1,d.open+dt*2.8);if(d.open>=1){const[x,y]=k.split(",").map(Number);world.map[y][x]=TILE.E;}}
  
  for(const e of enemies){
    if(e.dead){if(e.dt>0)e.dt-=dt;continue;}
    if(e.cd>0)e.cd-=dt;
    const d=dist(e.x,e.y,player.x,player.y);
    if(e.state==="idle"&&d<(e.boss?35:16)&&canSee(e.x,e.y,player.x,player.y)){e.state="chase";if(e.boss)snd("roar",e.x,e.y);}
    if(e.state==="chase"){
      const ml=(e.type==="demon"||e.type==="cow"||e.type==="spider"||e.type==="tramway");
      if(d>(ml?1.2:2)){
        const dx=(player.x-e.x)/d,dy=(player.y-e.y)/d,ms=e.speed*dt;
        let nx=e.x+dx*ms,ny=e.y+dy*ms;
        if(isFree(nx,ny,e.r)){e.x=nx;e.y=ny;e.stuck=0;}
        else if(isFree(nx,e.y,e.r)){e.x=nx;e.stuck+=dt;}
        else if(isFree(e.x,ny,e.r)){e.y=ny;e.stuck+=dt;}
        else{e.stuck+=dt;if(e.stuck>3){const sp=safeSp(player.x,player.y,e.r);e.x=sp.x;e.y=sp.y;e.stuck=0;}}
      }
      if(e.cd<=0&&canSee(e.x,e.y,player.x,player.y)){
        if(ml){if(d<1.5){getHit(e.type==="tramway"?40:e.type==="spider"?10:e.type==="cow"?12:18);e.cd=e.type==="tramway"?.5:.65;}}
        else if(projs.length<MAX_PROJS){
          const dx=(player.x-e.x)/d,dy=(player.y-e.y)/d,sh=e.boss?3:1;
          for(let i=0;i<sh;i++){const sp2=(i-Math.floor(sh/2))*.1,cc=Math.cos(sp2),ss=Math.sin(sp2);projs.push({x:e.x,y:e.y,dx:dx*cc-dy*ss,dy:dx*ss+dy*cc,dmg:e.boss?25:10,speed:7,life:3.5,pl:false});}
          e.cd=e.boss?.6:1.4;
        }
      }
    }
  }
  
  for(let i=projs.length-1;i>=0;i--){
    const p=projs[i];p.life-=dt;
    if(p.life<=0){projs.splice(i,1);continue;}
    p.x+=p.dx*p.speed*dt;p.y+=p.dy*p.speed*dt;
    if(isSolid(p.x,p.y)){if(p.rk)expld(p.x,p.y,p.dmg);projs.splice(i,1);continue;}
    if(p.pl){for(const e of enemies){if(e.dead)continue;if(dist(p.x,p.y,e.x,e.y)<e.r+.3){if(p.rk)expld(p.x,p.y,p.dmg);else{e.hp-=p.dmg;bld(e.x,e.y,4);if(e.hp<=0&&!e.dead){e.dead=true;e.dt=.4;player.kills++;if(phase===2)bKills++;snd("death",e.x,e.y);onDead(e);}}projs.splice(i,1);break;}}}
    else if(dist(p.x,p.y,player.x,player.y)<.45){getHit(p.dmg);projs.splice(i,1);}
  }
  
  for(const p of pickups){
    if(!p.alive||dist(p.x,p.y,player.x,player.y)>.6)continue;
    let pk=false;
    if(p.type==="med"&&player.hp<100){player.hp=Math.min(100,player.hp+25);pk=true;}
    else if(p.type==="bigmed"){player.hp=100;pk=true;}
    else if(p.type==="armor"&&player.armor<100){player.armor=Math.min(100,player.armor+50);pk=true;}
    else if(p.type==="ammo"){player.ammo+=25;player.shells+=10;player.rockets+=4;player.sniper+=3;pk=true;}
    else if(p.type==="keyR"&&!player.kR){player.kR=true;keyRpos=null;msg("🔴!",2);pk=true;snd("key");}
    else if(p.type==="keyB"&&!player.kB){player.kB=true;keyBpos=null;msg("🔵!",2);pk=true;snd("key");}
    else if(p.type==="milk"){player.hp=Math.min(100,player.hp+15);pk=true;}
    else if(p.type==="pkey"&&!hasPortalKey){hasPortalKey=true;msg("🟣!",2);pk=true;snd("key");}
    if(pk){p.alive=false;snd("pickup");}
  }
  
  for(let i=parts.length-1;i>=0;i--){const p=parts[i];p.t+=dt;p.x+=p.vx*dt;p.y+=p.vy*dt;p.z+=p.vz*dt;p.vz-=4*dt;if(p.z<0)p.z=0;if(p.t>=p.life)parts.splice(i,1);}
  
  if(tileAt(player.x,player.y)===TILE.X&&phase===0)startPhase(1);
  if(portalActive&&dist(player.x,player.y,portalX,portalY)<1.5){
    if(!hasPortalKey){msg("🔒!",1);}
    else{snd("telep");hasPortalKey=false;portalActive=false;
      if(phase===1)startPhase(2);else if(phase===2)startPhase(3);else if(phase===3)startPhase(4);else if(phase===4)startPhase(5);else if(phase===5)startPhase(6);
      else if(phase===6){startOutro();}
    }
  }
}

function render(){

let shX=0,shY=0;

// ========== GTA5-STYLE SKY ==========
const skyColors=[
  ["#801010","#500808","#300404"],["#700","#400","#200"],["#d4baa0","#b8a080","#907060"],
  ["#90d0ff","#60a0e0","#3880c0"],["#f0f0f0","#d0d0d0","#aaaaaa"],["#0a0a20","#050515","#020210"],["#90d0ff","#60a0e0","#3880c0"]
];
const sc=skyColors[phase]||skyColors[0];
const skyG=ctx.createLinearGradient(0,0,0,VIEW_H/2);
skyG.addColorStop(0,sc[0]);skyG.addColorStop(0.5,sc[1]);skyG.addColorStop(1,sc[2]);
ctx.fillStyle=skyG;ctx.fillRect(0,shY,W,VIEW_H/2);

}

// Dynamic clouds
if(phase===3||phase===4||phase===6){
  ctx.globalAlpha=.15;

    ctx.beginPath();ctx.ellipse(cx,30+i*25,80+i*20,15+i*5,0,0,7);ctx.fill();

  }

}

// ========== GTA5-STYLE FLOOR with reflections ==========
const floorColors=[
  ["#666","#444","#2a2a2a"],["#555","#333","#222"],["#b8a080","#907060","#685040"],
  ["#6a6","#484","#262"],["#ccc","#999","#666"],["#223","#112","#001"],["#6a6","#484","#262"]
];
const fc=floorColors[phase]||floorColors[0];
const flG=ctx.createLinearGradient(0,VIEW_H/2,0,VIEW_H);
flG.addColorStop(0,fc[0]);flG.addColorStop(0.3,fc[1]);flG.addColorStop(1,fc[2]);

// Floor specular (wet look)
if(phase===0||phase===1||phase===5){

}

const bobY=Math.sin(player.bob)*3*((keys.KeyW||keys.KeyS||keys.KeyA||keys.KeyD)?1:0);

// Zoom for AWP scope
const zoomFov=player.zoom?FOV*.35:FOV;
const zoomHalf=zoomFov/2;

// ========== RAYCASTING with GTA5 lighting ==========
for(let x=0;x<W;x++){
  const a=player.a-zoomHalf+(x/W)*zoomFov,dx=Math.cos(a),dy=Math.sin(a);
  let mx=Math.floor(player.x),my=Math.floor(player.y);
  const ddx=Math.abs(1/dx),ddy=Math.abs(1/dy);
  let sX,sY,side,sideX,sideY;
  if(dx<0){sX=-1;sideX=(player.x-mx)*ddx;}else{sX=1;sideX=(mx+1-player.x)*ddx;}
  if(dy<0){sY=-1;sideY=(player.y-my)*ddy;}else{sY=1;sideY=(my+1-player.y)*ddy;}
  let hit=false,t=0,raw=MAX_DIST;
  for(let i=0;i<150;i++){

    if(t>=TILE.D&&t<=TILE.DB){const d=world.doors.get(`${mx},${my}`);if(d&&d.open>=.9)continue;}

  }
  if(hit)raw=side===0?(mx-player.x+(1-sX)/2)/dx:(my-player.y+(1-sY)/2)/dy;
  const dC=Math.max(.1,raw*Math.cos(a-player.a));zbuf[x]=dC;
  let lH=Math.floor(VIEW_H/dC);
  if(t>=TILE.D&&t<=TILE.DB){const d=world.doors.get(`${mx},${my}`);if(d)lH=Math.floor(lH*(1-d.open*.9));}
  const y0=Math.floor(VIEW_H/2-lH/2+bobY+shY),y1=y0+lH;
  let texImg=T.w1;
  if(t===TILE.X){texImg=T.exit;ctx.globalAlpha=Math.sin(exitGlow)*.25+.75;}
  else if(t===TILE.D)texImg=T.door;else if(t===TILE.DR)texImg=T.doorR;else if(t===TILE.DB)texImg=T.doorB;
  else if(bloodMode)texImg=T.wb;else texImg=[null,T.w1,T.w2,T.w3,T.w4,T.w5,T.w6][t]||T.w1;
  let wx=side===0?player.y+raw*dy:player.x+raw*dx;wx-=Math.floor(wx);
  const ys=Math.max(0,y0),ye=Math.min(VIEW_H,y1);
  if(ye>ys)ctx.drawImage(texImg,Math.floor(wx*texImg.width),0,1,texImg.height,x+shX,ys,1,ye-ys);
  ctx.globalAlpha=1;
  // GTA5-style dynamic lighting with ambient occlusion
  let lb=0;for(const l of lights){const ld=dist(player.x+dx*raw,player.y+dy*raw,l.x,l.y);if(ld<l.r)lb+=.35*(1-ld/l.r)*(1-l.t/l.life);}

}

// ========== SPRITES ==========
const dX=Math.cos(player.a),dY=Math.sin(player.a),pX=-dY*Math.tan(zoomHalf),pY=dX*Math.tan(zoomHalf);
const spr=[];
for(const e of enemies)if(!e.dead||e.dt>0)spr.push({...e,isE:true});

for(const s of spr){
  const rx=s.x-player.x,ry=s.y-player.y,inv=1/(pX*dY-dX*pY),tX=inv*(dY*rx-dX*ry),tY=inv*(-pY*rx+pX*ry);

  if(s.isPo){const p=Math.sin(Date.now()*.005)*.1+1;w*=p;h*=p;y0=Math.floor(VIEW_H/2-h/2+bobY+shY);y1=y0+h;}
  if(s.dead){const f=h*(1-clamp(s.dt/.4,0,1))*.35;y0+=f;y1+=f;}
  const x0=Math.floor(scX-w/2+shX),x1=Math.floor(scX+w/2+shX);
  const tm={imp:T.imp,demon:T.demon,caco:T.caco,mega:T.mega,giant:T.giant,cow:T.cow,tramway:T.tramway,spider:T.spider,skibidi:T.skibidi,cameraman:T.cameraman,amogus:T.amogus,impostor:T.impostor,med:T.med,bigmed:T.bigmed,armor:T.armor,ammo:T.ammo,keyR:T.keyR,keyB:T.keyB,pkey:T.pkey,milk:T.milk,fire:T.fire,port:T.port,lport:T.lport};
  const texImg=tm[s.type];if(!texImg)continue;

    ctx.fillText({mega:"МЕГА-ДЕМОН",giant:"ДРЕВНИЙ",tramway:"ТРАМВАЙ",cameraman:"КАМЕРАМЕН",impostor:"IMPOSTOR"}[s.type]||"БОСС",scX+shX,by-4);

  ctx.strokeStyle="#555";ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(wx2-6,wy-140);ctx.lineTo(wx2-25,wy-100);ctx.stroke();
  ctx.beginPath();ctx.moveTo(wx2+6,wy-140);ctx.lineTo(wx2+25,wy-100);ctx.stroke();
}

// ========== SCOPE OVERLAY for AWP ==========
if(player.zoom){
  ctx.fillStyle="rgba(0,0,0,.85)";
  // Black out corners (scope view)
  ctx.beginPath();ctx.rect(0,0,W,VIEW_H);
  ctx.arc(W/2,VIEW_H/2,180,0,Math.PI*2,true);ctx.fill();
  // Scope ring
  ctx.strokeStyle="rgba(40,40,40,.9)";ctx.lineWidth=6;
  ctx.beginPath();ctx.arc(W/2,VIEW_H/2,180,0,7);ctx.stroke();
  ctx.strokeStyle="rgba(60,60,60,.5)";ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(W/2,VIEW_H/2,178,0,7);ctx.stroke();
  // Crosshairs
  ctx.strokeStyle="rgba(0,0,0,.8)";ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(W/2-180,VIEW_H/2);ctx.lineTo(W/2-10,VIEW_H/2);ctx.moveTo(W/2+10,VIEW_H/2);ctx.lineTo(W/2+180,VIEW_H/2);
  ctx.moveTo(W/2,VIEW_H/2-180);ctx.lineTo(W/2,VIEW_H/2-10);ctx.moveTo(W/2,VIEW_H/2+10);ctx.lineTo(W/2,VIEW_H/2+180);ctx.stroke();
  // Mil dots
  ctx.fillStyle="rgba(0,0,0,.6)";
  for(let i=1;i<=4;i++){
    ctx.beginPath();ctx.arc(W/2+i*30,VIEW_H/2,2,0,7);ctx.fill();
    ctx.beginPath();ctx.arc(W/2-i*30,VIEW_H/2,2,0,7);ctx.fill();
    ctx.beginPath();ctx.arc(W/2,VIEW_H/2+i*30,2,0,7);ctx.fill();
    ctx.beginPath();ctx.arc(W/2,VIEW_H/2-i*30,2,0,7);ctx.fill();
  }
  // Center dot
  ctx.fillStyle="rgba(255,0,0,.7)";ctx.beginPath();ctx.arc(W/2,VIEW_H/2,2,0,7);ctx.fill();
  // Scope tint
  ctx.fillStyle="rgba(180,220,255,.03)";ctx.beginPath();ctx.arc(W/2,VIEW_H/2,178,0,7);ctx.fill();
  // Range info
  ctx.fillStyle="rgba(200,200,200,.5)";ctx.font="10px Courier New";ctx.textAlign="right";
  ctx.fillText("x3.5",W/2+170,VIEW_H/2+170);
}

// Normal crosshair (when not zoomed)
if(!player.zoom){
  ctx.strokeStyle=player.weapon===3?"rgba(255,80,80,.8)":player.weapon===4?"rgba(80,200,255,.6)":"rgba(255,255,255,.5)";
  ctx.lineWidth=player.weapon>=3?2:1;
  const cs=player.weapon===3?12:player.weapon===4?8:6;
  ctx.beginPath();ctx.moveTo(W/2-cs,VIEW_H/2);ctx.lineTo(W/2-2,VIEW_H/2);ctx.moveTo(W/2+2,VIEW_H/2);ctx.lineTo(W/2+cs,VIEW_H/2);ctx.moveTo(W/2,VIEW_H/2-cs);ctx.lineTo(W/2,VIEW_H/2-2);ctx.moveTo(W/2,VIEW_H/2+2);ctx.lineTo(W/2,VIEW_H/2+cs);ctx.stroke();
}

// ========== GTA5-STYLE SCREEN EFFECTS ==========
// Hurt vignette
if(player.hurt>0){
  const hurtG=ctx.createRadialGradient(W/2,VIEW_H/2,VIEW_H*.2,W/2,VIEW_H/2,VIEW_H*.7);
  hurtG.addColorStop(0,"rgba(180,0,0,0)");hurtG.addColorStop(1,`rgba(200,0,0,${player.hurt*.6})`);
  ctx.fillStyle=hurtG;ctx.fillRect(0,0,W,VIEW_H);
}
// Low health pulse with heartbeat
if(player.hp<=25){
  const pulse=Math.sin(Date.now()*.008)*.12+.1;
  const lowG=ctx.createRadialGradient(W/2,VIEW_H/2,VIEW_H*.1,W/2,VIEW_H/2,VIEW_H*.7);
  lowG.addColorStop(0,"rgba(0,0,0,0)");lowG.addColorStop(1,`rgba(140,0,0,${pulse})`);
  ctx.fillStyle=lowG;ctx.fillRect(0,0,W,VIEW_H);
}

// ========== GTA5 VIGNETTE ==========
const vig=ctx.createRadialGradient(W/2,VIEW_H/2,VIEW_H*.25,W/2,VIEW_H/2,VIEW_H*.85);
vig.addColorStop(0,"rgba(0,0,0,0)");vig.addColorStop(0.7,"rgba(0,0,0,.08)");
vig.addColorStop(1,"rgba(0,0,0,.35)");
ctx.fillStyle=vig;ctx.fillRect(0,0,W,VIEW_H);

// Chromatic aberration at edges
ctx.globalCompositeOperation="lighter";
ctx.globalAlpha=.01;
ctx.fillStyle="#f00";ctx.fillRect(0,0,3,VIEW_H);
ctx.fillStyle="#0ff";ctx.fillRect(W-3,0,3,VIEW_H);
ctx.globalAlpha=1;
ctx.globalCompositeOperation="source-over";

// Film grain overlay
ctx.globalAlpha=.025;
for(let i=0;i<100;i++){ctx.fillStyle=Math.random()>.5?"#fff":"#000";ctx.fillRect(Math.random()*W,Math.random()*VIEW_H,1,1);}
ctx.globalAlpha=1;

if(hasSuit){ctx.strokeStyle="rgba(180,40,40,.25)";ctx.lineWidth=8;ctx.strokeRect(4,4,W-8,VIEW_H-8);}

// ========== GTA5-STYLE HUD ==========
ctx.fillStyle="#0a0a0a";ctx.fillRect(0,VIEW_H,W,HUD_H);
// HUD top line with gradient
const hudLine=ctx.createLinearGradient(0,VIEW_H,W,VIEW_H);
hudLine.addColorStop(0,"#222");hudLine.addColorStop(0.5,"#444");hudLine.addColorStop(1,"#222");
ctx.fillStyle=hudLine;ctx.fillRect(0,VIEW_H,W,2);

// HP bar with GTA5 style
const hpPct=player.hp/100;
ctx.fillStyle="#0a0a0a";ctx.fillRect(12,VIEW_H+12,108,30);
// HP bar inner shadow
ctx.fillStyle="rgba(0,0,0,.5)";ctx.fillRect(14,VIEW_H+14,104,26);
const hpG=ctx.createLinearGradient(14,VIEW_H+14,14,VIEW_H+40);
hpG.addColorStop(0,hpPct>.5?"#4f4":hpPct>.25?"#ff4":"#f44");
hpG.addColorStop(1,hpPct>.5?"#080":hpPct>.25?"#a80":"#800");
ctx.fillStyle=hpG;ctx.fillRect(14,VIEW_H+14,104*hpPct,26);
// HP bar shine
ctx.fillStyle="rgba(255,255,255,.1)";ctx.fillRect(14,VIEW_H+14,104*hpPct,10);
ctx.strokeStyle="#333";ctx.lineWidth=1;ctx.strokeRect(12,VIEW_H+12,108,30);
ctx.fillStyle="#fff";ctx.font="bold 15px Courier New";ctx.textAlign="center";ctx.fillText(`HP:${player.hp}`,66,VIEW_H+34);

// Armor bar
ctx.fillStyle="#0a0a0a";ctx.fillRect(12,VIEW_H+48,108,20);
if(player.armor>0){const ag=ctx.createLinearGradient(14,VIEW_H+50,14,VIEW_H+66);ag.addColorStop(0,"#6cf");ag.addColorStop(1,"#28a");ctx.fillStyle=ag;ctx.fillRect(14,VIEW_H+50,104*(player.armor/100),16);ctx.fillStyle="rgba(255,255,255,.1)";ctx.fillRect(14,VIEW_H+50,104*(player.armor/100),6);}
ctx.strokeStyle="#333";ctx.lineWidth=1;ctx.strokeRect(12,VIEW_H+48,108,20);
ctx.fillStyle="#8cf";ctx.font="bold 11px Courier New";ctx.textAlign="center";ctx.fillText(`ARM:${player.armor}`,66,VIEW_H+62);
if(hasSuit){ctx.fillStyle="#f66";ctx.font="bold 10px Courier New";ctx.fillText("🚀-65%",66,VIEW_H+78);}

// Ammo display with weapon-specific highlight
ctx.textAlign="right";ctx.font="bold 14px Courier New";
const wpColors=["#fff","#ff0","#fa0","#f55","#4df"];
ctx.fillStyle=player.weapon===1?"#ff0":"#886";ctx.fillText(`AMM:${player.ammo}`,W-16,VIEW_H+26);
ctx.fillStyle=player.weapon===2?"#fa0":"#864";ctx.fillText(`SHL:${player.shells}`,W-16,VIEW_H+44);
ctx.fillStyle=player.weapon===3?"#f55":"#844";ctx.fillText(`RKT:${player.rockets}`,W-16,VIEW_H+62);
ctx.fillStyle=player.weapon===4?"#4df":"#468";ctx.fillText(`AWP:${player.sniper}`,W-16,VIEW_H+80);

// Current weapon display
ctx.textAlign="center";
const wpNames=["👊 КУЛАК","🔫 ПИСТОЛЕТ","💥 ДРОБОВИК","🚀 РПГ","🎯 AWP"];
ctx.fillStyle=wpColors[player.weapon];ctx.font="bold 14px Courier New";
ctx.fillText(`[${player.weapon+1}] ${wpNames[player.weapon]}`,W/2,VIEW_H+26);
ctx.fillStyle="#f80";ctx.font="bold 12px Courier New";
ctx.fillText(phaseNames[phase],W/2,VIEW_H+44);

// Keys
ctx.font="20px Arial";
ctx.fillStyle=player.kR?"#f44":"#444";ctx.fillText("🔴",W/2-25,VIEW_H+68);
ctx.fillStyle=player.kB?"#44f":"#444";ctx.fillText("🔵",W/2+25,VIEW_H+68);
if(hasPortalKey){ctx.fillStyle="#f0f";ctx.fillText("🟣",W/2,VIEW_H+68);}
ctx.fillStyle="#aaa";ctx.font="11px Courier New";ctx.fillText(`K:${player.kills}`,W/2,VIEW_H+86);
if(phase===2){ctx.fillStyle="#f0f";ctx.font="bold 16px Courier New";ctx.fillText(`${bKills}/25`,W/2,VIEW_H+106);}

// ========== MINIMAP with GTA5 style ==========
const mapW=108,mapH=108,mapX=W-mapW-8,mapY=8;
// Map background with gradient
const mapBg=ctx.createRadialGradient(mapX+mapW/2,mapY+mapH/2,0,mapX+mapW/2,mapY+mapH/2,mapW/2);
mapBg.addColorStop(0,"rgba(0,25,0,.88)");mapBg.addColorStop(1,"rgba(0,15,0,.92)");
ctx.fillStyle=mapBg;ctx.fillRect(mapX,mapY,mapW,mapH);
// Map border with glow
ctx.strokeStyle="rgba(0,200,50,.6)";ctx.lineWidth=1.5;ctx.strokeRect(mapX,mapY,mapW,mapH);
ctx.strokeStyle="rgba(0,200,50,.15)";ctx.lineWidth=3;ctx.strokeRect(mapX-1,mapY-1,mapW+2,mapH+2);

const msc=1.3,mcx=mapX+mapW/2,mcy=mapY+mapH/2,mapR=38;
for(let dy=-mapR;dy<=mapR;dy++)for(let dx=-mapR;dx<=mapR;dx++){
  const mx=Math.floor(player.x)+dx,my=Math.floor(player.y)+dy;
  if(mx<0||my<0||mx>=world.w||my>=world.h)continue;
  const px=mcx+dx*msc,py=mcy+dy*msc;
  if(px<mapX||px>mapX+mapW||py<mapY||py>mapY+mapH)continue;
  const t=world.map[my]?.[mx];
  if(t&&t>0){ctx.fillStyle=t===TILE.DR?"#f44":t===TILE.DB?"#44f":t>=TILE.D?"#880":"#4a4";ctx.fillRect(px,py,msc,msc);}
}
const blink=Math.floor(Date.now()/180)%2;
for(const e of enemies){if(e.dead)continue;const dx=e.x-player.x,dy=e.y-player.y;if(Math.abs(dx)>mapR||Math.abs(dy)>mapR)continue;const px=mcx+dx*msc,py=mcy+dy*msc;if(px<mapX+2||px>mapX+mapW-2||py<mapY+2||py>mapY+mapH-2)continue;ctx.fillStyle=e.boss?(blink?"#f00":"#f80"):"#f44";ctx.beginPath();ctx.arc(px,py,e.boss?4:2,0,7);ctx.fill();}
if(portalActive){const dx=portalX-player.x,dy=portalY-player.y;if(Math.abs(dx)<mapR&&Math.abs(dy)<mapR){ctx.fillStyle=blink?"#f0f":"#a0a";ctx.beginPath();ctx.arc(mcx+dx*msc,mcy+dy*msc,5,0,7);ctx.fill();}}
if(world.exitX&&phase===0){const dx=world.exitX-player.x,dy=world.exitY-player.y;if(Math.abs(dx)<mapR&&Math.abs(dy)<mapR){ctx.fillStyle=blink?"#0f0":"#0a0";ctx.beginPath();ctx.arc(mcx+dx*msc,mcy+dy*msc,4,0,7);ctx.fill();}}
// Player indicator with direction cone
ctx.fillStyle="#0f0";ctx.beginPath();ctx.arc(mcx,mcy,3,0,7);ctx.fill();
ctx.fillStyle="rgba(0,255,0,.1)";ctx.beginPath();ctx.moveTo(mcx,mcy);ctx.arc(mcx,mcy,25,player.a-.3,player.a+.3);ctx.fill();
ctx.strokeStyle="#0f0";ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(mcx,mcy);ctx.lineTo(mcx+Math.cos(player.a)*12,mcy+Math.sin(player.a)*12);ctx.stroke();

// FPS counter
ctx.fillStyle="rgba(0,0,0,.7)";ctx.fillRect(mapX-50,mapY,46,20);
ctx.strokeStyle="rgba(0,200,50,.4)";ctx.lineWidth=1;ctx.strokeRect(mapX-50,mapY,46,20);
ctx.fillStyle=fps>=55?"#0f0":fps>=35?"#ff0":"#f00";
ctx.font="bold 12px Courier New";ctx.textAlign="center";ctx.fillText(`${fps}`,mapX-27,mapY+15);

// Message display
if(msgTimer>0){
  ctx.fillStyle="rgba(0,0,0,.82)";ctx.fillRect(W/2-210,8,420,42);
  ctx.strokeStyle="rgba(255,200,0,.5)";ctx.lineWidth=1;ctx.strokeRect(W/2-210,8,420,42);
  const msgGlow=ctx.createLinearGradient(W/2-210,8,W/2+210,8);
  msgGlow.addColorStop(0,"rgba(255,200,0,0)");msgGlow.addColorStop(0.5,"rgba(255,200,0,.05)");msgGlow.addColorStop(1,"rgba(255,200,0,0)");
  ctx.fillStyle=msgGlow;ctx.fillRect(W/2-210,8,420,42);
  ctx.fillStyle="#ff0";ctx.font="bold 15px Courier New";ctx.textAlign="center";ctx.fillText(msgText,W/2,35);
}
}

function frame(ts){if(!lastTime)lastTime=ts;const dt=Math.min((ts-lastTime)/1000,.04);lastTime=ts;update(dt);render();requestAnimationFrame(frame);}

function begin(){
  initAudio();
  if(localStorage.getItem("doomBeaten")&&!bloodMode){blocker.classList.add("show");return;}
  // Start intro cinematic
  startIntro();
  snd("ambient");
}

window.addEventListener("keydown",e=>{
  keys[e.code]=true;
  if(state===STATE.MENU){
    if(e.code==="ArrowUp"||e.code==="KeyW"){menuSel=(menuSel-1+menuItems.length)%menuItems.length;snd("menu");}
    if(e.code==="ArrowDown"||e.code==="KeyS"){menuSel=(menuSel+1)%menuItems.length;snd("menu");}
    if(e.code==="Enter"||e.code==="Space"){snd("select");if(menuSel===0)begin();}
  }
  // Skip intro/outro
  if((e.code==="Enter"||e.code==="Space")&&state===STATE.INTRO){
    introState.done=true;startPhase(0);state=STATE.PLAY;canvas.requestPointerLock?.();
  }
  if((e.code==="Enter")&&state===STATE.OUTRO){
    outroState.done=true;gameCompleted=true;state=STATE.MENU;
  }
  if(e.code==="Enter"&&state===STATE.DEAD)begin();
  if(e.code==="Escape"&&state===STATE.PLAY){state=STATE.MENU;document.exitPointerLock?.();}
  if(e.code==="Space")e.preventDefault();
});
window.addEventListener("keyup",e=>{keys[e.code]=false;});
canvas.addEventListener("mousedown",e=>{
  if(state===STATE.MENU){initAudio();snd("select");if(menuSel===0)begin();return;}
  if(state===STATE.DEAD){begin();return;}
  if(state===STATE.INTRO){introState.done=true;startPhase(0);state=STATE.PLAY;canvas.requestPointerLock?.();return;}
  if(document.pointerLockElement!==canvas){canvas.requestPointerLock?.();return;}
  if(e.button===0)keys.mouse=true;
  if(e.button===2)keys.mouse2=true;
});
window.addEventListener("mouseup",e=>{if(e.button===0)keys.mouse=false;if(e.button===2)keys.mouse2=false;});
document.addEventListener("mousemove",e=>{
  if(document.pointerLockElement===canvas&&state===STATE.PLAY)mouseDX+=e.movementX;
  if(state===STATE.MENU){mouseX=clamp(mouseX+e.movementX,0,W);mouseY=clamp(mouseY+e.movementY,0,H);}
});
canvas.addEventListener("contextmenu",e=>e.preventDefault());
continueBtn.addEventListener("click",()=>{blocker.classList.remove("show");bloodMode=true;begin();});
requestAnimationFrame(frame);
</script>
</body>
</html>
